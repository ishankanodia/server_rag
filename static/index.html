<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FileWhisper</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #080b10;
      --panel: #0e1219;
      --border: #1c2333;
      --accent: #00e5ff;
      --accent2: #ff6b6b;
      --accent3: #69ff94;
      --text: #cdd9e5;
      --muted: #4a5568;
      --radius: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 24px;
      width: 100%;
      flex: 1;
    }

    header {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 40px;
    }

    .logo-box {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--accent), #0077ff);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
      box-shadow: 0 0 20px rgba(0,229,255,0.2);
    }

    h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
    h1 span { color: var(--accent); }
    .tagline { font-size: 12px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; margin-top: 4px; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .panel-title {
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }

    .panel-title::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
    }

    /* BREADCRUMB */
    .breadcrumb {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      align-items: center;
      margin-bottom: 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      min-height: 22px;
    }

    .crumb {
      color: var(--accent);
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .crumb:hover { background: rgba(0,229,255,0.1); }
    .crumb.current { color: var(--text); cursor: default; }
    .crumb.current:hover { background: none; }
    .crumb-sep { color: var(--muted); }

    /* BROWSER LIST */
    .browser-list {
      max-height: 230px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-bottom: 10px;
    }

    .browser-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
      border: 1px solid transparent;
      user-select: none;
    }

    .browser-item:hover { background: rgba(255,255,255,0.04); border-color: var(--border); }
    .browser-item.selected { background: rgba(0,229,255,0.07); border-color: rgba(0,229,255,0.25); }
    .browser-item .icon { font-size: 15px; flex-shrink: 0; width: 20px; text-align: center; }
    .browser-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .browser-item .arrow { color: var(--muted); font-size: 11px; flex-shrink: 0; }
    .browser-item.dir .name { color: var(--text); }
    .browser-item.file .name { color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 11px; }

    .folder-self-item {
      border-color: rgba(0,229,255,0.2) !important;
      background: rgba(0,229,255,0.04) !important;
      margin-bottom: 6px;
    }
    .folder-self-item .name { color: var(--accent) !important; font-size: 12px !important; }

    /* SELECTED PATH */
    .selected-path {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--accent3);
      padding: 6px 10px;
      background: rgba(105,255,148,0.05);
      border: 1px solid rgba(105,255,148,0.15);
      border-radius: var(--radius);
      margin-bottom: 10px;
      word-break: break-all;
      display: none;
    }
    .selected-path.visible { display: block; }

    /* BUTTONS */
    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }

    .btn-cyan { background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.3); color: var(--accent); }
    .btn-cyan:hover { background: rgba(0,229,255,0.18); box-shadow: 0 0 14px rgba(0,229,255,0.1); transform: translateY(-1px); }
    .btn-cyan:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .btn-green { background: rgba(105,255,148,0.1); border: 1px solid rgba(105,255,148,0.3); color: var(--accent3); }
    .btn-green:hover { background: rgba(105,255,148,0.18); transform: translateY(-1px); }
    .btn-green:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .btn-red { background: rgba(255,107,107,0.07); border: 1px solid rgba(255,107,107,0.2); color: var(--accent2); margin-top: 10px; }
    .btn-red:hover { background: rgba(255,107,107,0.14); transform: translateY(-1px); }

    .settings-grid {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 10px;
      align-items: center;
    }
    @media (max-width: 640px) { .settings-grid { grid-template-columns: 1fr; } }

    .settings-grid label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .field {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
    }

    .field:focus { border-color: var(--accent); }

    .field-note {
      grid-column: 2;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      line-height: 1.5;
      margin-top: -4px;
    }
    @media (max-width: 640px) { .field-note { grid-column: 1; } }

    .settings-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }
    @media (max-width: 640px) { .settings-actions { grid-template-columns: 1fr; } }

    .settings-status {
      margin-top: 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      min-height: 18px;
    }

    /* INGEST LOG */
    .ingest-log { margin-top: 10px; max-height: 90px; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; }
    .log-line { font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 3px 8px; border-radius: 4px; }
    .log-line.ok { color: var(--accent3); background: rgba(105,255,148,0.04); }
    .log-line.skip { color: var(--muted); }
    .log-line.err { color: var(--accent2); background: rgba(255,107,107,0.04); }

    /* SOURCES */
    .sources-list { margin-top: 4px; display: flex; flex-direction: column; gap: 5px; max-height: 220px; overflow-y: auto; }
    .source-item { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); padding: 5px 8px; background: var(--bg); border-radius: 4px; border: 1px solid var(--border); word-break: break-all; display: flex; align-items: flex-start; gap: 6px; }

    .empty-state { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); text-align: center; padding: 20px; }

    /* ASK */
    .ask-panel { margin-bottom: 20px; }
    textarea { width: 100%; height: 76px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; padding: 12px; resize: none; outline: none; transition: border-color 0.2s; line-height: 1.5; margin-bottom: 10px; }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .response-wrap { margin-top: 18px; display: none; }
    .response-wrap.visible { display: block; }

    .q-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 8px; padding: 6px 10px; background: var(--panel); border-radius: var(--radius); border: 1px solid var(--border); }

    .answer-box { background: var(--panel); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: var(--radius); padding: 16px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-wrap: break-word; overflow-wrap: break-word; min-height: 48px; }

    .followup-box { margin-top: 10px; background: rgba(0,229,255,0.04); border: 1px solid rgba(0,229,255,0.15); border-radius: var(--radius); padding: 12px 14px; font-size: 13px; color: var(--accent); font-style: italic; line-height: 1.6; word-wrap: break-word; white-space: pre-wrap; overflow-wrap: break-word; display: none; }

    /* SOURCE TAGS */
    .sources-used {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .source-tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      background: rgba(0,229,255,0.07);
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 4px;
      padding: 3px 8px;
      display: flex;
      align-items: center;
      gap: 4px;
      letter-spacing: 0.02em;
    }

    .sources-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-top: 10px;
      margin-bottom: 4px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .thinking { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 13px; font-family: 'IBM Plex Mono', monospace; }
    .dots span { display: inline-block; width: 5px; height: 5px; background: var(--accent); border-radius: 50%; margin: 0 2px; animation: bounce 1.2s infinite; }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

    .status-strip { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); text-align: center; padding: 10px; border-top: 1px solid var(--border); }
    .status-strip span { color: var(--accent3); }

    .loading-spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 4px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo-box">🗄️</div>
    <div>
      <h1>File<span>Whisper</span></h1>
      <div class="tagline">// ask your files · localhost:8001</div>
    </div>
  </header>

  <div class="grid">

    <!-- Folder Browser -->
    <div class="panel">
      <div class="panel-title">Browse & Ingest</div>
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="browser-list" id="browserList">
        <div class="empty-state"><span class="loading-spinner"></span> Loading…</div>
      </div>
      <div class="selected-path" id="selectedPath"></div>
      <button class="btn btn-cyan" id="ingestBtn" disabled>⚡ Index Selected</button>
      <div class="ingest-log" id="ingestLog"></div>
    </div>

    <!-- Sources -->
    <div class="panel">
      <div class="panel-title">Indexed Sources</div>
      <div class="sources-list" id="sourcesList">
        <div class="empty-state">No sources indexed yet.</div>
      </div>
      <button class="btn btn-red" id="clearBtn">🗑 Clear All</button>
    </div>

  </div>

  <div class="panel ask-panel">
    <div class="panel-title">LLM Settings</div>
    <div class="settings-grid">
      <label for="llmProvider">Provider</label>
      <select class="field" id="llmProvider">
        <option value="groq">Groq</option>
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic Claude</option>
        <option value="gemini">Google Gemini</option>
        <option value="custom">Custom OpenAI-compatible</option>
      </select>

      <label for="llmModel">Model</label>
      <input class="field" id="llmModel" list="llmModelList" placeholder="llama-3.3-70b-versatile" />
      <datalist id="llmModelList"></datalist>

      <label for="llmBaseUrl">Base URL</label>
      <input class="field" id="llmBaseUrl" placeholder="https://api.groq.com/openai/v1" />

      <label>Key Status</label>
      <div class="field-note" id="llmKeyNote">No key configured yet.</div>

      <label for="llmApiKey">API Key</label>
      <input class="field" id="llmApiKey" type="password" placeholder="Paste your provider API key" />
      <div class="field-note">Saved on this computer for future app launches.</div>
    </div>
    <div class="settings-actions">
      <button class="btn btn-cyan" id="saveLlmBtn">Save LLM Settings</button>
      <button class="btn btn-green" id="reloadLlmBtn">Reload Settings</button>
    </div>
    <div class="settings-status" id="llmStatus"></div>
  </div>

  <!-- Ask -->
  <div class="panel ask-panel">
    <div class="panel-title">Ask Your Knowledge Base</div>
    <textarea id="question" placeholder="Ask anything about your indexed files… (Enter to submit)"></textarea>
    <button class="btn btn-green" id="askBtn">↩ Ask</button>
    <div class="response-wrap" id="responseWrap">
      <div class="q-label" id="qLabel"></div>
      <div class="answer-box" id="answerBox"></div>
      <div class="followup-box" id="followupBox"></div>
      <div class="sources-label" id="sourcesLabel" style="display:none;">Sources</div>
      <div class="sources-used" id="sourcesUsed"></div>
    </div>
  </div>

</div>

<div class="status-strip">FileWhisper · <span id="sourceCount">0</span> sources indexed · running on localhost:8001</div>

<script>
  const BASE = window.location.origin;
  const EXT_ICONS = { ".pdf":"📕",".txt":"📄",".md":"📝",".png":"🖼️",".jpg":"🖼️",".jpeg":"🖼️",".webp":"🖼️",".bmp":"🖼️",".tiff":"🖼️" };
  const PROVIDER_DEFAULTS = {
    groq: {
      model: "llama-3.3-70b-versatile",
      baseUrl: "https://api.groq.com/openai/v1",
      models: [
        "llama-3.3-70b-versatile",
        "meta-llama/llama-4-scout-17b-16e-instruct",
        "openai/gpt-oss-120b",
        "openai/gpt-oss-20b",
        "qwen/qwen3-32b",
        "llama-3.1-8b-instant"
      ]
    },
    openai: {
      model: "gpt-5-mini",
      baseUrl: "https://api.openai.com/v1",
      models: [
        "gpt-5.2",
        "gpt-5.2-pro",
        "gpt-5.1",
        "gpt-5-mini",
        "gpt-5-nano",
        "gpt-4.1",
        "gpt-4.1-mini",
        "gpt-4o-mini"
      ]
    },
    anthropic: {
      model: "claude-sonnet-4-6",
      baseUrl: "https://api.anthropic.com/v1",
      models: [
        "claude-opus-4-8",
        "claude-sonnet-4-6",
        "claude-haiku-4-5-20251001",
        "claude-opus-4-7",
        "claude-opus-4-6"
      ]
    },
    gemini: {
      model: "gemini-2.5-flash",
      baseUrl: "https://generativelanguage.googleapis.com/v1beta",
      models: [
        "gemini-2.5-flash",
        "gemini-2.5-pro",
        "gemini-2.5-flash-lite",
        "gemini-3.5-flash",
        "gemini-flash-latest"
      ]
    },
    custom: { model: "", baseUrl: "" }
  };

  let selectedPath = null;

  async function browse(path) {
    selectedPath = null;
    document.getElementById("selectedPath").classList.remove("visible");
    document.getElementById("ingestBtn").disabled = true;

    const list = document.getElementById("browserList");
    list.innerHTML = '<div class="empty-state"><span class="loading-spinner"></span> Loading…</div>';

    try {
      const res = await fetch(`${BASE}/browse?path=${encodeURIComponent(path)}`);
      if (!res.ok) {
        const err = await res.json();
        list.innerHTML = `<div class="empty-state" style="color:var(--accent2)">⚠️ ${err.detail}</div>`;
        return;
      }
      const data = await res.json();
      renderBreadcrumb(data.breadcrumb);
      renderList(data.entries, data.path);
    } catch(e) {
      list.innerHTML = `<div class="empty-state" style="color:var(--accent2)">Cannot reach backend</div>`;
    }
  }

  function renderBreadcrumb(parts) {
    const bc = document.getElementById("breadcrumb");
    bc.innerHTML = parts.map((p, i) => {
      const isLast = i === parts.length - 1;
      return `${i > 0 ? '<span class="crumb-sep"> / </span>' : ''}<span class="crumb ${isLast?'current':''}" data-path="${p.path}">${p.name || '/'}</span>`;
    }).join('');
    bc.querySelectorAll(".crumb:not(.current)").forEach(el => {
      el.onclick = () => browse(el.dataset.path);
    });
  }

  function selectPath(path) {
    selectedPath = path;
    const sp = document.getElementById("selectedPath");
    sp.innerText = "✓ Selected: " + path;
    sp.classList.add("visible");
    document.getElementById("ingestBtn").disabled = false;
  }

  function renderList(entries, currentFolderPath) {
    const list = document.getElementById("browserList");
    list.innerHTML = "";

    // "Index this folder" button at top
    const folderBtn = document.createElement("div");
    folderBtn.className = "browser-item folder-self-item";
    folderBtn.innerHTML = `<span class="icon">📂</span><span class="name">Index this entire folder</span>`;
    folderBtn.onclick = () => {
      list.querySelectorAll(".browser-item").forEach(x => x.classList.remove("selected"));
      folderBtn.classList.add("selected");
      selectPath(currentFolderPath);
    };
    list.appendChild(folderBtn);

    if (!entries.length) {
      const empty = document.createElement("div");
      empty.className = "empty-state";
      empty.innerText = "No supported files or subfolders here.";
      list.appendChild(empty);
      return;
    }

    entries.forEach(e => {
      const icon = e.type === "dir" ? "📁" : (EXT_ICONS[e.ext] || "📄");
      const item = document.createElement("div");
      item.className = `browser-item ${e.type}`;
      item.innerHTML = `
        <span class="icon">${icon}</span>
        <span class="name">${e.name}</span>
        ${e.type === "dir" ? '<span class="arrow">›</span>' : ''}`;

      item.onclick = () => {
        if (e.type === "dir") {
          browse(e.path);
        } else {
          list.querySelectorAll(".browser-item").forEach(x => x.classList.remove("selected"));
          item.classList.add("selected");
          selectPath(e.path);
        }
      };
      list.appendChild(item);
    });
  }

  // Ingest
  document.getElementById("ingestBtn").onclick = async () => {
    if (!selectedPath) return;
    const btn = document.getElementById("ingestBtn");
    const log = document.getElementById("ingestLog");
    btn.disabled = true;
    log.innerHTML = '<div class="log-line"><span class="loading-spinner"></span> Indexing…</div>';

    try {
      const res = await fetch(`${BASE}/ingest`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path: selectedPath })
      });
      const data = await res.json();
      if (data.error) {
        log.innerHTML = `<div class="log-line err">❌ ${data.error}</div>`;
      } else {
        log.innerHTML = data.details.map(d =>
          `<div class="log-line ${d.status==='indexed'?'ok':'skip'}">${d.status==='indexed'?'✓':'—'} ${d.file.split('/').pop()} (${d.chunks} chunks)</div>`
        ).join('');
        loadSources();
      }
    } catch(e) {
      log.innerHTML = `<div class="log-line err">❌ Backend not reachable</div>`;
    }
    btn.disabled = false;
  };

  // Sources
  async function loadSources() {
    try {
      const res = await fetch(`${BASE}/sources`);
      const data = await res.json();
      const list = document.getElementById("sourcesList");
      document.getElementById("sourceCount").innerText = data.sources.length;
      if (!data.sources.length) {
        list.innerHTML = '<div class="empty-state">No sources indexed yet.</div>';
        return;
      }
      list.innerHTML = data.sources.map(s => {
        const ext = "." + s.split('.').pop().toLowerCase();
        return `<div class="source-item">${EXT_ICONS[ext]||"📄"} ${s}</div>`;
      }).join('');
    } catch(e) {}
  }

  document.getElementById("clearBtn").onclick = async () => {
    if (!confirm("Clear all indexed sources?")) return;
    await fetch(`${BASE}/sources`, { method: "DELETE" });
    document.getElementById("ingestLog").innerHTML = "";
    loadSources();
  };

  function applyProviderDefaults() {
    const provider = document.getElementById("llmProvider").value;
    const defaults = PROVIDER_DEFAULTS[provider];
    const model = document.getElementById("llmModel");
    const baseUrl = document.getElementById("llmBaseUrl");
    const modelList = document.getElementById("llmModelList");
    modelList.innerHTML = (defaults.models || []).map(name => `<option value="${name}"></option>`).join("");
    if (!model.value.trim()) model.value = defaults.model;
    if (provider !== "custom") baseUrl.value = defaults.baseUrl;
    baseUrl.disabled = provider !== "custom";
  }

  async function loadLlmConfig() {
    const status = document.getElementById("llmStatus");
    status.innerText = "Loading settings...";
    try {
      const res = await fetch(`${BASE}/llm-config`);
      const data = await res.json();
      document.getElementById("llmProvider").value = data.provider || "groq";
      document.getElementById("llmModel").value = data.model || "";
      document.getElementById("llmBaseUrl").value = data.base_url || "";
      document.getElementById("llmApiKey").value = "";
      document.getElementById("llmKeyNote").innerText = data.has_api_key
        ? "Key configured on this computer."
        : "No key configured. Paste a provider key below.";
      applyProviderDefaults();
      status.innerText = `Active: ${data.provider} / ${data.model}${data.has_api_key ? " / key set" : " / no key"}`;
    } catch(e) {
      status.innerText = "Could not load LLM settings.";
    }
  }

  document.getElementById("llmProvider").onchange = () => {
    document.getElementById("llmModel").value = "";
    document.getElementById("llmBaseUrl").value = "";
    applyProviderDefaults();
  };

  document.getElementById("reloadLlmBtn").onclick = loadLlmConfig;

  document.getElementById("saveLlmBtn").onclick = async () => {
    const btn = document.getElementById("saveLlmBtn");
    const status = document.getElementById("llmStatus");
    btn.disabled = true;
    status.innerText = "Saving settings...";

    try {
      const res = await fetch(`${BASE}/llm-config`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          provider: document.getElementById("llmProvider").value,
          model: document.getElementById("llmModel").value,
          base_url: document.getElementById("llmBaseUrl").value,
          api_key: document.getElementById("llmApiKey").value || null
        })
      });
      const data = await res.json();
      if (!res.ok) {
        status.innerText = data.detail || "Could not save settings.";
      } else {
        document.getElementById("llmApiKey").value = "";
        document.getElementById("llmKeyNote").innerText = data.has_api_key
          ? "Key configured on this computer."
          : "No key configured. Paste a provider key above.";
        status.innerText = `Saved: ${data.provider} / ${data.model}${data.has_api_key ? " / key set" : " / no key"}`;
      }
    } catch(e) {
      status.innerText = "Could not reach backend.";
    }
    btn.disabled = false;
  };

  // Ask
  function typeText(el, text, speed=10) {
    el.innerText = ""; let i = 0;
    function go() { if (i < text.length) { el.innerText += text.charAt(i++); setTimeout(go, speed); } }
    go();
  }

  document.getElementById("question").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); document.getElementById("askBtn").click(); }
  });

  document.getElementById("askBtn").onclick = async () => {
    const question = document.getElementById("question").value.trim();
    const btn = document.getElementById("askBtn");
    const wrap = document.getElementById("responseWrap");
    const answerBox = document.getElementById("answerBox");
    const followupBox = document.getElementById("followupBox");
    const qLabel = document.getElementById("qLabel");
    const sourcesUsed = document.getElementById("sourcesUsed");
    const sourcesLabel = document.getElementById("sourcesLabel");

    if (!question) return;
    btn.disabled = true;
    wrap.classList.add("visible");
    qLabel.innerText = "You asked: " + question;
    followupBox.style.display = "none";
    followupBox.innerText = "";
    sourcesUsed.innerHTML = "";
    sourcesLabel.style.display = "none";
    answerBox.innerHTML = `<div class="thinking"><div class="dots"><span></span><span></span><span></span></div> Searching knowledge base…</div>`;

    try {
      const res = await fetch(`${BASE}/ask`, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({question}) });
      const data = await res.json();

      typeText(answerBox, data.answer || "No answer returned.", 8);

      // Show source file tags
      if (data.sources && data.sources.length) {
        sourcesLabel.style.display = "block";
        data.sources.forEach(filename => {
          const ext = "." + filename.split('.').pop().toLowerCase();
          const tag = document.createElement("div");
          tag.className = "source-tag";
          tag.innerHTML = `${EXT_ICONS[ext] || "📄"} ${filename}`;
          sourcesUsed.appendChild(tag);
        });
      }

      if (data.follow_up) {
        setTimeout(() => {
          followupBox.style.display = "block";
          followupBox.style.cursor = "pointer";
          followupBox.title = "Click to ask this question";
          typeText(followupBox, "💡 " + data.follow_up, 14);
          followupBox.onclick = () => {
            document.getElementById("question").value = data.follow_up;
            document.getElementById("askBtn").click();
          };
        }, (data.answer?.length || 0) * 8 + 300);
      }
    } catch(e) { answerBox.innerText = "❌ Error: Backend not reachable."; }
    btn.disabled = false;
  };

  browse("/Users");
  loadSources();
  loadLlmConfig();
</script>
</body>
</html>
