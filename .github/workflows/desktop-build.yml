name: Desktop Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            bundle: dmg
            artifact: filewhisper-macos
            artifact_path: src-tauri/target/release/bundle/dmg/*.dmg
          - os: windows-2022
            bundle: nsis
            artifact: filewhisper-windows
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Windows installer tooling
        if: startsWith(matrix.os, 'windows-')
        shell: pwsh
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Build backend executable
        run: pyinstaller --noconfirm filewhisper-backend.spec

      - name: Build desktop app
        run: npm run desktop:build -- --bundles ${{ matrix.bundle }}

      - name: Strip macOS quarantine flag
        if: startsWith(matrix.os, 'macos-')
        run: |
          # Remove extended attributes that cause "damaged app" errors
          find src-tauri/target/release/bundle/dmg -name '*.dmg' -exec xattr -cr {} \;
          # Also strip from the .app inside the build if accessible
          find src-tauri/target/release/bundle -name '*.app' -exec xattr -cr {} \; 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_path }}
